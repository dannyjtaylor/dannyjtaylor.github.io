<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Film clapperboard - Win95 pixel art style -->
  <!-- Board body -->
  <rect x="4" y="16" width="40" height="28" fill="#808080" stroke="#000" stroke-width="1"/>
  <rect x="5" y="17" width="38" height="26" fill="#c0c0c0"/>
  <rect x="5" y="17" width="38" height="1" fill="#fff"/>
  <rect x="5" y="17" width="1" height="26" fill="#fff"/>
  <rect x="42" y="17" width="1" height="26" fill="#404040"/>
  <rect x="5" y="42" width="38" height="1" fill="#404040"/>
  <!-- Clapper top -->
  <polygon points="4,16 44,16 42,6 6,6" fill="#000"/>
  <!-- Clapper stripes -->
  <polygon points="8,6 12,6 14,16 10,16" fill="#fff"/>
  <polygon points="18,6 22,6 24,16 20,16" fill="#fff"/>
  <polygon points="28,6 32,6 34,16 30,16" fill="#fff"/>
  <polygon points="38,6 42,6 44,16 40,16" fill="#fff"/>
  <!-- Hinge circle -->
  <circle cx="6" cy="6" r="3" fill="#808080" stroke="#000" stroke-width="1"/>
  <!-- Text lines on board -->
  <rect x="10" y="22" width="20" height="2" fill="#000"/>
  <rect x="10" y="27" width="28" height="2" fill="#000"/>
  <rect x="10" y="32" width="16" height="2" fill="#000"/>
  <rect x="10" y="37" width="24" height="2" fill="#808080"/>
</svg>
