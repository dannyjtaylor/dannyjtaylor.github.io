<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" shape-rendering="crispEdges">
  <!-- reel background -->
  <rect x="0" y="0" width="32" height="32" fill="#1a0505"/>
  <rect x="1" y="1" width="30" height="30" fill="#220808"/>
  <!-- border -->
  <rect x="0" y="0" width="32" height="2" fill="#550010"/>
  <rect x="0" y="30" width="32" height="2" fill="#550010"/>
  <rect x="0" y="0" width="2" height="32" fill="#550010"/>
  <rect x="30" y="0" width="2" height="32" fill="#550010"/>
  <!-- lucky 7 top bar -->
  <rect x="5" y="4" width="22" height="5" fill="#ff0033"/>
  <rect x="5" y="4" width="22" height="2" fill="#ff6666"/>
  <!-- lucky 7 stem diagonal -->
  <rect x="17" y="9"  width="8" height="5" fill="#ff0033"/>
  <rect x="13" y="14" width="8" height="5" fill="#ff0033"/>
  <rect x="9"  y="19" width="8" height="5" fill="#ff0033"/>
  <!-- stem highlights -->
  <rect x="17" y="9"  width="2" height="5" fill="#ff6666"/>
  <rect x="13" y="14" width="2" height="5" fill="#ff6666"/>
  <rect x="9"  y="19" width="2" height="5" fill="#ff6666"/>
  <!-- gold stars -->
  <rect x="4"  y="26" width="3" height="3" fill="#ffd700"/>
  <rect x="14" y="27" width="3" height="3" fill="#ffd700"/>
  <rect x="25" y="26" width="3" height="3" fill="#ffd700"/>
</svg>
